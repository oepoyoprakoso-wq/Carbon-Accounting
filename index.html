<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CO2 Calculation Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
            text-align: center;
        }

        .subtitle {
            color: #999;
            font-size: 14px;
            text-align: center;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }

        .label-with-unit {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .unit {
            font-size: 12px;
            color: #999;
            font-weight: normal;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        input.error {
            border-color: #ff6b6b;
            background-color: #fff5f5;
        }

        .error-message {
            color: #ff6b6b;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .btn-calculate {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-calculate:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-calculate:active {
            transform: translateY(0);
        }

        .btn-reset {
            background: #f0f0f0;
            color: #555;
        }

        .btn-reset:hover {
            background: #e0e0e0;
        }

        .results {
            margin-top: 30px;
            display: none;
            animation: fadeIn 0.3s ease-out;
        }

        .results.show {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .results-title {
            color: #333;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .result-item {
            background: #f8f9ff;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 12px;
            border-left: 4px solid #667eea;
        }

        .result-label {
            color: #666;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .result-value {
            color: #333;
            font-size: 24px;
            font-weight: 700;
            font-family: 'Courier New', monospace;
        }

        .result-unit {
            font-size: 12px;
            color: #999;
            margin-left: 5px;
        }

        .error-box {
            background: #fff5f5;
            border: 2px solid #ff6b6b;
            color: #ff6b6b;
            padding: 12px;
            border-radius: 6px;
            margin-top: 15px;
            display: none;
            font-size: 14px;
        }

        .error-box.show {
            display: block;
        }

        .success-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #51cf66;
            font-size: 13px;
            margin-top: 10px;
        }

        .checkmark {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #51cf66;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            font-weight: bold;
        }

        @media (max-width: 480px) {
            .container {
                padding: 25px;
            }

            h1 {
                font-size: 24px;
            }

            .result-value {
                font-size: 20px;
            }

            .button-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }

        .live-calc-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #666;
        }

        .toggle-switch {
            width: 40px;
            height: 22px;
            background: #e0e0e0;
            border-radius: 11px;
            cursor: pointer;
            position: relative;
            transition: background 0.3s ease;
        }

        .toggle-switch.active {
            background: #667eea;
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: left 0.3s ease;
        }

        .toggle-switch.active::after {
            left: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>CO₂ Calculation Tool</h1>
        <p class="subtitle">Calculate Specific Gross & Net CO₂ Emissions</p>

        <div class="live-calc-toggle">
            <label for="liveCalc" style="margin: 0; cursor: pointer;">Live Calculation</label>
            <div class="toggle-switch" id="liveCalcToggle"></div>
            <input type="checkbox" id="liveCalc" style="display: none;">
        </div>

        <form id="calculatorForm">
            <div class="form-group">
                <div class="label-with-unit">
                    <label for="cf">Clinker Factor (CF)</label>
                    <span class="unit">%</span>
                </div>
                <input type="number" id="cf" placeholder="Enter clinker factor" step="0.01" min="0">
                <div class="error-message"></div>
            </div>

            <div class="form-group">
                <div class="label-with-unit">
                    <label for="st">STEC (ST)</label>
                    <span class="unit">mj/ton clin</span>
                </div>
                <input type="number" id="st" placeholder="Enter STEC value" step="0.01" min="0">
                <div class="error-message"></div>
            </div>

            <div class="form-group">
                <div class="label-with-unit">
                    <label for="bm">TSR Biomass (BM)</label>
                    <span class="unit">%</span>
                </div>
                <input type="number" id="bm" placeholder="Enter TSR Biomass" step="0.01" min="0" max="100">
                <div class="error-message"></div>
            </div>

            <div class="form-group">
                <div class="label-with-unit">
                    <label for="af">TSR Alternative Fuel (AF)</label>
                    <span class="unit">%</span>
                </div>
                <input type="number" id="af" placeholder="Enter TSR Alternative Fuel" step="0.01" min="0" max="100">
                <div class="error-message"></div>
            </div>

            <div class="button-group">
                <button type="button" class="btn-calculate" id="calculateBtn">Calculate</button>
                <button type="button" class="btn-reset" id="resetBtn">Reset</button>
            </div>

            <div class="error-box" id="errorBox"></div>

            <div class="results" id="results">
                <div class="results-title">
                    Results
                    <div class="success-indicator">
                        <div class="checkmark">✓</div>
                        <span>Calculation Complete</span>
                    </div>
                </div>

                <div class="result-item">
                    <div class="result-label">Specific Gross CO₂</div>
                    <div class="result-value">
                        <span id="grossCO2">0.00</span>
                        <span class="result-unit">kg CO₂/ton</span>
                    </div>
                </div>

                <div class="result-item">
                    <div class="result-label">Specific Net CO₂</div>
                    <div class="result-value">
                        <span id="netCO2">0.00</span>
                        <span class="result-unit">kg CO₂/ton</span>
                    </div>
                </div>
            </div>
        </form>
    </div>

    <script>
        // Form elements
        const form = document.getElementById('calculatorForm');
        const cfInput = document.getElementById('cf');
        const stInput = document.getElementById('st');
        const bmInput = document.getElementById('bm');
        const afInput = document.getElementById('af');
        const calculateBtn = document.getElementById('calculateBtn');
        const resetBtn = document.getElementById('resetBtn');
        const resultsDiv = document.getElementById('results');
        const errorBox = document.getElementById('errorBox');
        const grossCO2Display = document.getElementById('grossCO2');
        const netCO2Display = document.getElementById('netCO2');
        const liveCalcToggle = document.getElementById('liveCalcToggle');
        const liveCalcCheckbox = document.getElementById('liveCalc');

        // Input fields for easier iteration
        const inputFields = [cfInput, stInput, bmInput, afInput];
        const inputLabels = {
            cf: 'Clinker Factor (CF)',
            st: 'STEC (ST)',
            bm: 'TSR Biomass (BM)',
            af: 'TSR Alternative Fuel (AF)'
        };

        // Toggle live calculation
        liveCalcToggle.addEventListener('click', () => {
            liveCalcCheckbox.checked = !liveCalcCheckbox.checked;
            liveCalcToggle.classList.toggle('active');
        });

        // Validate a single input
        function validateInput(input) {
            const value = input.value.trim();
            const errorMessage = input.parentElement.querySelector('.error-message');

            if (value === '') {
                errorMessage.textContent = `${inputLabels[input.id]} is required`;
                errorMessage.classList.add('show');
                input.classList.add('error');
                return false;
            }

            const numValue = parseFloat(value);
            if (isNaN(numValue)) {
                errorMessage.textContent = `${inputLabels[input.id]} must be a valid number`;
                errorMessage.classList.add('show');
                input.classList.add('error');
                return false;
            }

            if (numValue < 0) {
                errorMessage.textContent = `${inputLabels[input.id]} must be non-negative`;
                errorMessage.classList.add('show');
                input.classList.add('error');
                return false;
            }

            // Additional validation for percentage fields
            if ((input.id === 'bm' || input.id === 'af') && numValue > 100) {
                errorMessage.textContent = `${inputLabels[input.id]} must not exceed 100%`;
                errorMessage.classList.add('show');
                input.classList.add('error');
                return false;
            }

            if (input.id === 'cf' && numValue === 0) {
                errorMessage.textContent = `${inputLabels[input.id]} cannot be zero`;
                errorMessage.classList.add('show');
                input.classList.add('error');
                return false;
            }

            errorMessage.classList.remove('show');
            input.classList.remove('error');
            return true;
        }

        // Validate all inputs
        function validateAllInputs() {
            let allValid = true;
            inputFields.forEach(input => {
                if (!validateInput(input)) {
                    allValid = false;
                }
            });
            return allValid;
        }

        // Validate combination of BM and AF
        function validateCombination() {
            const bm = parseFloat(bmInput.value.trim()) || 0;
            const af = parseFloat(afInput.value.trim()) || 0;

            if (bm + af > 100) {
                errorBox.textContent = 'Error: BM + AF cannot exceed 100%';
                errorBox.classList.add('show');
                return false;
            }

            errorBox.classList.remove('show');
            return true;
        }

        // Calculate results
        function calculate() {
            // Clear previous errors
            errorBox.classList.remove('show');

            // Validate all inputs
            if (!validateAllInputs()) {
                resultsDiv.classList.remove('show');
                return;
            }

            // Validate combination
            if (!validateCombination()) {
                resultsDiv.classList.remove('show');
                return;
            }

            // Get input values
            const CF = parseFloat(cfInput.value.trim());
            const ST = parseFloat(stInput.value.trim());
            const BM = parseFloat(bmInput.value.trim());
            const AF = parseFloat(afInput.value.trim());

            try {
                // Calculate Specific Gross CO2
                const grossCO2 = (
                    (
                        (AF / 100 * ST) * 80.9 / 1000000 +
                        ((100 - BM - AF) / 100 * ST) * 96 / 1000000
                    ) * (1 + 0.012) +
                    530 / 1000 +
                    1.55 * 0.2 / 100 * 3.664
                ) / (1 / CF * 100) * 1000;

                // Calculate Specific Net CO2
                const netCO2 = (
                    (
                        ((100 - BM - AF) / 100 * ST) * 96 / 1000000
                    ) * (1 + 0.012) +
                    530 / 1000 +
                    1.55 * 0.2 / 100 * 3.664
                ) / (1 / CF * 100) * 1000;

                // Display results with appropriate precision
                grossCO2Display.textContent = formatResult(grossCO2);
                netCO2Display.textContent = formatResult(netCO2);

                // Show results section
                resultsDiv.classList.add('show');
            } catch (error) {
                errorBox.textContent = 'Error during calculation. Please check your inputs.';
                errorBox.classList.add('show');
                resultsDiv.classList.remove('show');
            }
        }

        // Format result with 2-4 decimal precision
        function formatResult(value) {
            // Remove trailing zeros and unnecessary decimals
            return parseFloat(value.toFixed(4)).toString();
        }

        // Reset form
        function reset() {
            form.reset();
            resultsDiv.classList.remove('show');
            errorBox.classList.remove('show');
            inputFields.forEach(input => {
                input.classList.remove('error');
                const errorMessage = input.parentElement.querySelector('.error-message');
                errorMessage.classList.remove('show');
            });
        }

        // Event listeners
        calculateBtn.addEventListener('click', (e) => {
            e.preventDefault();
            calculate();
        });

        resetBtn.addEventListener('click', (e) => {
            e.preventDefault();
            reset();
        });

        // Add input validation on change
        inputFields.forEach(input => {
            input.addEventListener('input', () => {
                validateInput(input);
                if (liveCalcCheckbox.checked) {
                    // Delay calculation to avoid too frequent updates
                    clearTimeout(input.calcTimeout);
                    input.calcTimeout = setTimeout(calculate, 300);
                }
            });

            input.addEventListener('blur', () => {
                validateInput(input);
            });
        });

        // Allow Enter key to trigger calculation
        form.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                calculate();
            }
        });

        // Initialize
        reset();
    </script>
</body>
</html>
